{% extends 'base.html' %}

{% block title %}Blog Controllerdoktor{% endblock %}

{% block content %}
    <h1>Blog-Einträge</h1>
    <ul class="einträge">
        {% for post in posts %}
            <li><a href ="{% url 'blog_detail' post.slug %}">{{ post.title }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
